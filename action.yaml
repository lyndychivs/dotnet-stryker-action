name: "dotnet-stryker-action"
description: "GitHub Action for mutation testing with Stryker.NET via Docker"
author: "lyndychivs"

branding:
  icon: "crosshair"
  color: "red"

inputs:
  configurationFile:
    description: "The path of the Stryker.NET configuration file."
    required: true

  dashboardApiKey:
    description: "The API key for authentication with the Stryker dashboard."
    required: false
    default: ""

runs:
  using: "docker"
  image: "Dockerfile"
