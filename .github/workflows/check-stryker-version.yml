name: check-stryker-version
run-name: Check Stryker Version

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-stryker-version:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Get Latest Stryker Version
        id: latest
        run: |
          LATEST=$(curl -sSL https://api.nuget.org/v3-flatcontainer/dotnet-stryker/index.json | jq -r '[.versions[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | last')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get Current Stryker Version
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=dotnet-stryker --version )\S+' Dockerfile)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check Versions Match
        env:
          LATEST: ${{ steps.latest.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
        run: |
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "Stryker version mismatch: current=$CURRENT, latest=$LATEST"
            exit 1
          fi
          echo "Stryker version is up to date: $CURRENT"
